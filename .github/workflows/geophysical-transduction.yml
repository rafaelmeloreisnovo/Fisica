name: Geophysical Transduction Gate

on:
  pull_request:
    paths:
      - 'src/geophysical_transduction.py'
      - 'src/geophysical_run_receipt.py'
      - 'src/solid_earth_hydrology.py'
      - 'data/literature/geophysical_transduction_sources.json'
      - 'data/literature/solid_earth_hydrology_sources.json'
      - 'configs/geophysical_transduction_experiment.example.json'
      - 'configs/geophysical_run_manifest.template.json'
      - 'tests/test_geophysical_transduction.py'
      - 'tests/test_geophysical_run_receipt.py'
      - 'tests/test_solid_earth_hydrology.py'
      - 'tests/fixtures/geophysical_run/**'
      - 'docs/GEOPHYSICAL_REAL_DATA_RECEIPT.md'
      - '.github/workflows/geophysical-transduction.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install test runner
        run: python -m pip install --disable-pip-version-check pytest
      - name: Compile
        run: |
          python -m py_compile src/geophysical_transduction.py
          python -m py_compile src/geophysical_run_receipt.py
          python -m py_compile src/solid_earth_hydrology.py
      - name: Validate geophysical DOI registry
        run: python src/geophysical_transduction.py validate-registry data/literature/geophysical_transduction_sources.json
      - name: Validate solid-Earth and hydrology registry
        run: python src/solid_earth_hydrology.py validate-registry data/literature/solid_earth_hydrology_sources.json
      - name: Evaluate empty preregistration manifest
        run: python src/geophysical_transduction.py evaluate-manifest configs/geophysical_transduction_experiment.example.json
      - name: Build synthetic raw-data receipt
        run: |
          python src/geophysical_run_receipt.py validate-run \
            tests/fixtures/geophysical_run/manifest.json \
            --output /tmp/geophysical-run-receipt.json
          python - <<'PY'
          import json
          from pathlib import Path
          receipt = json.loads(Path('/tmp/geophysical-run-receipt.json').read_text())
          assert receipt['evidence_state'] == 'SYNTHETIC_FIXTURE'
          assert receipt['claim_allowed'] is False
          assert receipt['winner'] == 'TOKEN_VAZIO'
          assert receipt['clock']['synchronization_ok'] is True
          PY
      - name: Check Earth-hum period comparator
        run: python src/solid_earth_hydrology.py classify-period 100
      - name: Run adversarial tests
        run: |
          python -m pytest -q \
            tests/test_geophysical_transduction.py \
            tests/test_geophysical_run_receipt.py \
            tests/test_solid_earth_hydrology.py
